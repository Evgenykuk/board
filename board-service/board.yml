openapi: 3.0.3
info:
  title: Airport Simulation — Board (Борт) API + DB
  description: >
    Board — сервис самолётов (борта): plane.state, позиция, capacity, готовность и boarding result.

    REST используется для UI (создать борт/посмотреть статусы).
    Межсервисные факты — через Kafka.
  version: "1.0.0"
  contact:
    name: Кукушка (Board owner)

servers:
  - url: http://board:8000
    description: Internal Docker DNS
  - url: http://localhost:8009
    description: Host port mapping (8009:8000)
  - url: http://localhost:8080/api/board
    description: Nginx gateway

tags:
  - name: Health
  - name: Planes

components:
  responses:
    ValidationError:
      description: Ошибка валидации входных данных
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            missing:
              value: { code: "validation_error", message: "planeId is required" }

    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            nf:
              value: { code: "not_found", message: "Plane not found" }

    Conflict:
      description: Конфликт (plane уже существует, если не делаете идемпотентный create)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            exists:
              value: { code: "already_exists", message: "Plane PL-1 already exists" }

    InternalError:
      description: Внутренняя ошибка сервиса
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            dbDown:
              value: { code: "internal_error", message: "Database unavailable" }

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    PlaneState:
      type: string
      enum: [InHangar, AtParking, Handling, Ready, Taxiing, Departed, InFlight, Arrived, WaitingRoute]

    Plane:
      type: object
      required: [planeId, state, locationNode, capacity, fuelLevel, fuelRequired, createdAt, updatedAt]
      properties:
        planeId: { type: string, example: "PL-1" }
        flightId: { type: string, nullable: true, example: "FL123" }
        state: { $ref: "#/components/schemas/PlaneState" }
        locationNode: { type: string, example: "HANGAR-1" }
        capacity: { type: integer, minimum: 0, example: 180 }
        fuelLevel: { type: integer, minimum: 0, example: 2000 }
        fuelRequired: { type: integer, minimum: 0, example: 3000 }
        routeId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PlaneCreateRequest:
      type: object
      required: [planeId, capacity, fuelLevel, fuelRequired, startNode]
      properties:
        planeId: { type: string, example: "PL-1" }
        flightId: { type: string, nullable: true, example: "FL123" }
        capacity: { type: integer, minimum: 0, example: 180 }
        fuelLevel: { type: integer, minimum: 0, example: 2000 }
        fuelRequired: { type: integer, minimum: 0, example: 3000 }
        startNode: { type: string, example: "HANGAR-1" }

    PlaneChecklist:
      type: object
      properties:
        needFuel: { type: boolean }
        needCatering: { type: boolean }
        needBus: { type: boolean }
        needFollowme: { type: boolean }
        fuelDone: { type: boolean }
        cateringDone: { type: boolean }
        busDone: { type: boolean }
        followmeDone: { type: boolean }
        passengersBoarded: { type: integer, minimum: 0 }
      required:
        [needFuel, needCatering, needBus, needFollowme, fuelDone, cateringDone, busDone, followmeDone, passengersBoarded]

    PlaneManifest:
      type: object
      properties:
        planeId: { type: string }
        passengerIds:
          type: array
          items: { type: string }
      required: [planeId, passengerIds]

paths:
  /health:
    get:
      tags: [Health]
      summary: Healthcheck
      responses:
        "200":
          description: OK
          content:
            application/json:
              example: { status: "ok" }

  /v1/planes:
    get:
      tags: [Planes]
      summary: Список бортов
      parameters:
        - in: query
          name: state
          required: false
          schema: { $ref: "#/components/schemas/PlaneState" }
        - in: query
          name: flightId
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Plane" }
        "500": { $ref: "#/components/responses/InternalError" }

    post:
      tags: [Planes]
      summary: Создать борт (идемпотентно рекомендуется)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlaneCreateRequest" }
      responses:
        "201":
          description: Создан
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plane" }
        "200":
          description: Уже существовал (идемпотентный повтор)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plane" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalError" }

  /v1/planes/{planeId}:
    get:
      tags: [Planes]
      summary: Получить борт по planeId
      parameters:
        - in: path
          name: planeId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plane" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /v1/planes/by-flight/{flightId}:
    get:
      tags: [Planes]
      summary: Получить борт по flightId (если назначен)
      parameters:
        - in: path
          name: flightId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plane" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /v1/planes/{planeId}/checklist:
    get:
      tags: [Planes]
      summary: Чек-лист готовности борта
      parameters:
        - in: path
          name: planeId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaneChecklist" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /v1/planes/{planeId}/manifest:
    get:
      tags: [Planes]
      summary: Список пассажиров на борту (manifest)
      parameters:
        - in: path
          name: planeId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlaneManifest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }